version: '3.8'

services:
  # ====================
  # MinIO 对象存储服务
  # ====================
  minio:
    image: minio/minio:latest
    container_name: tradelens-minio
    ports:
      - "9000:9000" # API 接口端口 (Spring Boot 后端连这个)
      - "9001:9001" # Web 控制台端口 (你用浏览器连这个看界面)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      # 左边是宿主机(你电脑)的全新目录，右边是容器内的目录
      - ./docker_data/minio_data:/data 
    restart: always

  # ====================
  # Redis 缓存服务
  # ====================
  redis:
    image: redis:7.0-alpine
    container_name: tradelens-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # 开启 AOF 持久化
    volumes:
      - ./docker_data/redis_data:/data
    restart: always